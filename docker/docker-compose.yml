version: '3.8'

services:
  adverse-news-screening:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8280:8280"
    environment:
      # Override specific container networking settings
      - HOST=0.0.0.0
      - PORT=8280
      - MONGO_URI=mongodb://mongodb:27017
    volumes:
      - ../config/ssl/cert.pem:/app/cert.pem:ro
      - ../config/ssl/key.pem:/app/key.pem:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8280/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    env_file:
      - ../.env
    environment:
      - MONGO_INITDB_DATABASE=adverse_news_screening
    volumes:
      - mongodb_data:/data/db
      - ../config/mongodb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    driver: bridge
