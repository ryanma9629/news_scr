# Example docker-compose configuration using published Docker image
# This file demonstrates how to use a published image instead of building locally

version: '3.8'

services:
  adverse-news-screening:
    # Use published image instead of building locally
    image: your-dockerhub-username/adverse-news-screening:latest
    # Uncomment the line below to use a specific version
    # image: your-dockerhub-username/adverse-news-screening:v1.0.0
    
    env_file:
      - ../.env
    ports:
      - "8280:8280"
    environment:
      # Override specific container networking settings
      - HOST=0.0.0.0
      - PORT=8280
      - MONGO_URI=mongodb://mongodb:27017
      - POSTGRES_HOST=postgres
    volumes:
      - ../config/ssl/cert.pem:/app/cert.pem:ro
      - ../config/ssl/key.pem:/app/key.pem:ro
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8280/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    env_file:
      - ../.env
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=adverse_news_screening
    volumes:
      - mongodb_data:/data/db
      - ../config/mongodb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15
    env_file:
      - ../.env
    ports:
      - "8432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../config/postgresql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    driver: bridge

# Alternative registry examples:
# 
# For GitHub Container Registry:
# image: ghcr.io/your-username/adverse-news-screening:latest
#
# For AWS ECR:
# image: 123456789012.dkr.ecr.us-west-2.amazonaws.com/adverse-news-screening:latest
#
# For Google GCR:
# image: gcr.io/your-project-id/adverse-news-screening:latest
#
# For Azure ACR:
# image: your-registry.azurecr.io/adverse-news-screening:latest
