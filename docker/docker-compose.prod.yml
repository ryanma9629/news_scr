version: '3.8'

# Production Docker Compose configuration
# Use this for production deployments with proper security and performance settings

services:
  adverse-news-screening:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8280:8280"
    environment:
      # Server configuration
      - HOST=0.0.0.0
      - PORT=8280
      - RELOAD=false
      
      # MongoDB connection
      - MONGO_URI=mongodb://mongodb:27017
      
      # PostgreSQL connection
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=adverse_news_screening
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_TAGS_TABLE=${POSTGRES_TAGS_TABLE:-fc_tags}
      
      # Deployment configuration
      - VI_DEPLOY=${VI_DEPLOY:-true}
      
      # Azure OpenAI configuration (required)
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - OPENAI_API_VERSION=${OPENAI_API_VERSION:-2025-03-01-preview}
      
      # DeepSeek configuration (required)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      
      # Tongyi Qwen configuration (required)
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      
      # Search API keys (optional)
      - BING_SUBSCRIPTION_KEY=${BING_SUBSCRIPTION_KEY}
      - BING_SEARCH_URL=${BING_SEARCH_URL:-https://api.bing.microsoft.com/v7.0/search}
      - SERPER_API_KEY=${SERPER_API_KEY}
      
      # Apify configuration (optional)
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      
      # SSL configuration (optional)
      - SSL_KEYFILE=${SSL_KEYFILE}
      - SSL_CERTFILE=${SSL_CERTFILE}
    volumes:
      - ../config/ssl/cert.pem:/app/cert.pem:ro
      - ../config/ssl/key.pem:/app/key.pem:ro
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8280/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=adverse_news_screening
      # Uncomment and set these for authentication in production
      # - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      # - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ../config/mongodb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: mongod --auth

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=adverse_news_screening
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Enable connection logging for production monitoring
      - POSTGRES_LOG_STATEMENT=all
      - POSTGRES_LOG_CONNECTIONS=on
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_config:/etc/postgresql
      - ../config/postgresql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  postgres_config:
    driver: local

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
